name: well_check
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  encrypt: ^5.0.3
  firebase_core: ^3.10.1
  firebase_crashlytics: ^4.2.5
  firebase_messaging: ^15.2.1
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.0.0
  flutter_riverpod: ^3.2.1
  flutter_secure_storage: ^9.2.2
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  logger: ^2.4.0
  path_provider: ^2.1.5
  pdf: ^3.11.3
  purchases_flutter: ^7.0.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.4
  supabase_flutter: ^2.6.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
